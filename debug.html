<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug</title></head>
<body style="background:#0a1520; color:#fff; font-family:monospace; padding:20px; font-size:13px;">
<h2 style="color:#D6A21C;">API Version Check</h2>
<div id="out"></div>
<script>
var out = document.getElementById('out');
function log(msg, color) {
  out.innerHTML += '<div style="padding:5px 0; color:'+(color||'#fff')+'">'+msg+'</div>';
}

// Call question-options with a bad questionId — 
// if new version is deployed it returns {ok:false, error:"Missing questionId"} for empty
// if old version is deployed it returns different error
log('Test 1: empty questionId (checks which version is deployed)', '#a9c0d3');
fetch('/api/question-options', {credentials:'include'})
  .then(r => { log('HTTP: '+r.status); return r.text(); })
  .then(txt => { log('Response: '+txt, '#ffa94d'); });

// Call with a real questionId but no auth — should return options or auth error  
var qid = 'ee2e381a-3a66-4a41-b011-63ef249162ae';
log('Test 2: real questionId no auth', '#a9c0d3');
fetch('/api/question-options?questionId='+qid, {credentials:'include'})
  .then(r => { log('HTTP: '+r.status); return r.text(); })
  .then(txt => { log('Response (first 400 chars): '+txt.substring(0,400), '#ffa94d'); });

log('Test 3: with lang=es', '#a9c0d3');
fetch('/api/question-options?questionId='+qid+'&lang=es', {credentials:'include'})
  .then(r => { log('HTTP: '+r.status); return r.text(); })
  .then(txt => { log('Response (first 400 chars): '+txt.substring(0,400), '#ffa94d'); });
</script>
</body>
</html>
