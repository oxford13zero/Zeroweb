<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Master Debug</title>
<style>
body { margin:0; padding:20px; background:#0a1520; color:#fff; font-family:monospace; font-size:13px; }
h1 { color:#D6A21C; margin:0 0 16px 0; }
.card { background:#16222D; border:1px solid #365468; border-radius:8px; padding:14px; margin-bottom:12px; }
.card h2 { margin:0 0 10px 0; color:#D6A21C; font-size:14px; }
button { padding:8px 18px; background:#D6A21C; color:#000; border:none; border-radius:4px; font-weight:700; cursor:pointer; margin-right:8px; }
input { padding:7px; background:#1E2F3F; border:1px solid #365468; color:#fff; border-radius:4px; width:160px; margin-right:6px; }
.out { margin-top:10px; white-space:pre-wrap; line-height:1.7; font-size:12px; }
.g{color:#69db7c;}.r{color:#ff6b6b;}.y{color:#ffa94d;}.b{color:#74c0fc;}
</style>
</head>
<body>
<h1>Master Index Debug</h1>

<div class="card">
  <h2>1 — Login</h2>
  <input id="u" placeholder="username" />
  <input id="p" type="password" placeholder="password" />
  <button onclick="login()">LOGIN</button>
  <div class="out" id="r1"></div>
</div>

<div class="card">
  <h2>2 — Check deployed /index.html (MASTER)</h2>
  <button onclick="checkMaster()">CHECK /index.html</button>
  <div class="out" id="r2"></div>
</div>

<div class="card">
  <h2>3 — Raw /api/me response</h2>
  <button onclick="checkMe()">CHECK /api/me</button>
  <div class="out" id="r3"></div>
</div>

<script>
function set(id, html) { document.getElementById(id).innerHTML = html; }

async function login() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value.trim();
  var r = await fetch('/api/login', {method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p})});
  var d = await r.json();
  set('r1', d.ok ? '<span class="g">✓ '+d.school_name+'</span>' : '<span class="r">✗ '+(d.error||'unknown')+'</span>');
  if (d.ok) { checkMe(); }
}

async function checkMaster() {
  var r = await fetch('/', {credentials:'include'});
  var html = await r.text();
  var out = '';
  out += 'Size: '+html.length+' chars\n';

  // Find the exact refreshSession sessionState block
  var idx = html.indexOf("window.sessionState = {");
  // Find second occurrence (first is declaration, second is in refreshSession)
  var idx2 = html.indexOf("window.sessionState = {", idx+1);

  if (idx2 > 0) {
    var block = html.substring(idx2, idx2+300);
    out += '\nExact refreshSession block:\n';
    out += block.split('\n').slice(0,10).join('\n') + '\n';
    out += '\n';
    out += 'Has language field: <span class="'+(block.includes('language')? 'g':'r')+'">'+(block.includes('language')?'✓ YES':'✗ NO')+'</span>\n';
  } else {
    out += '<span class="r">Second sessionState block NOT FOUND</span>\n';
  }

  out += 'lang param in question-options: <span class="'+(html.includes("lang=${CHOSEN_LANGUAGE}")?'g':'r')+'">'+(html.includes("lang=${CHOSEN_LANGUAGE}")?'✓ YES':'✗ NO')+'</span>\n';
  out += 'CHOSEN_LANGUAGE fix: <span class="'+(html.includes("CHOSEN_LANGUAGE === 'both'")?'g':'r')+'">'+(html.includes("CHOSEN_LANGUAGE === 'both'")?'✓ YES':'✗ NO')+'</span>\n';

  set('r2', out);
}

async function checkMe() {
  var r = await fetch('/api/me', {credentials:'include'});
  var txt = await r.text();
  set('r3', 'Raw /api/me response:\n' + txt);
}
</script>
</body>
</html>
