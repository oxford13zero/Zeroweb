<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>EN Page Debug</title></head>
<body style="background:#0a1520; color:#fff; font-family:monospace; padding:20px; font-size:13px;">
<h2 style="color:#D6A21C;">Check what /en/index.html contains</h2>
<div id="out" style="white-space:pre-wrap; line-height:1.8;"></div>
<script>
function log(msg, color) {
  document.getElementById('out').innerHTML += '<span style="color:'+(color||'#fff')+'">'+msg+'</span>\n';
}

fetch('/en/', {credentials:'include'})
  .then(r => r.text())
  .then(html => {
    log('Page size: ' + html.length + ' chars');
    log('Has es→/ redirect: ' + html.includes("location.href = '/' + location.hash"),
        html.includes("location.href = '/' + location.hash") ? '#69db7c' : '#ff6b6b');
    log('Has CHOSEN_LANGUAGE sync: ' + html.includes("CHOSEN_LANGUAGE = ok ?"),
        html.includes("CHOSEN_LANGUAGE = ok ?") ? '#69db7c' : '#ff6b6b');
    log('Has language in refreshSession: ' + html.includes("language: data?.language"),
        html.includes("language: data?.language") ? '#69db7c' : '#ff6b6b');
    log('html lang attr: ' + (html.match(/<html lang="(\w+)"/) || ['','?'])[1]);
  });
</script>
</body>
</html>
