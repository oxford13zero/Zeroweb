<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Options Debug</title></head>
<body style="background:#0a1520; color:#fff; font-family:monospace; padding:20px; font-size:13px;">
<h2 style="color:#D6A21C;">question-options debug</h2>
<p style="color:#a9c0d3;">Login as MX school first, then open this page.</p>
<div id="out" style="margin-top:16px;"></div>
<script>
var out = document.getElementById('out');
function log(msg, color) {
  out.innerHTML += '<div style="padding:5px 0; border-bottom:1px solid #333; color:'+(color||'#fff')+'">'+msg+'</div>';
}

log('Step 1: checking session...', '#a9c0d3');

fetch('/api/me', {credentials:'include'})
  .then(r=>r.json())
  .then(function(me) {
    log('school: ' + me.school_name + ' | language: ' + me.language + ' | ok: ' + me.ok, me.ok?'#69db7c':'#ff6b6b');

    if (!me.ok) { log('NOT LOGGED IN — login at tech4zero.com first then come back', '#ff6b6b'); return; }

    var qid = 'ee2e381a-3a66-4a41-b011-63ef249162ae';

    log('Step 2: calling WITHOUT lang param...', '#a9c0d3');
    fetch('/api/question-options?questionId='+qid, {credentials:'include'})
      .then(function(r) {
        log('HTTP status: ' + r.status, r.status===200?'#69db7c':'#ff6b6b');
        return r.text();
      })
      .then(function(txt) {
        log('Raw response: ' + txt.substring(0,300), '#fff');
        try {
          var d = JSON.parse(txt);
          log('Parsed ok. options count: ' + (d.options||[]).length, '#ffa94d');
          (d.options||[]).forEach(function(o) {
            log('  option_text="'+o.option_text+'" language="'+o.language+'"');
          });
        } catch(e) { log('JSON parse error: '+e.message, '#ff6b6b'); }

        log('Step 3: calling WITH ?lang=es...', '#a9c0d3');
        fetch('/api/question-options?questionId='+qid+'&lang=es', {credentials:'include'})
          .then(r=>r.text())
          .then(function(txt2) {
            log('Raw response: ' + txt2.substring(0,300), '#fff');
            try {
              var d2 = JSON.parse(txt2);
              log('WITH lang=es — options count: ' + (d2.options||[]).length, '#69db7c');
              (d2.options||[]).forEach(function(o) {
                log('  "'+o.option_text+'" lang='+o.language);
              });
            } catch(e) { log('JSON parse error: '+e.message, '#ff6b6b'); }
          });
      });
  })
  .catch(function(e) { log('ERROR: '+e.message, '#ff6b6b'); });
</script>
</body>
</html>
