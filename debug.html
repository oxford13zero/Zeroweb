<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>T4Z Debug</title>
<style>
* { box-sizing:border-box; }
body { margin:0; padding:20px; background:#0a1520; color:#fff; font-family:monospace; font-size:14px; }
h1 { color:#D6A21C; font-size:20px; margin:0 0 20px 0; }
.card { background:#16222D; border:1px solid #365468; border-radius:8px; padding:16px; margin-bottom:16px; }
.card h2 { margin:0 0 12px 0; color:#D6A21C; font-size:15px; }
input { padding:8px; background:#1E2F3F; border:1px solid #365468; color:#fff; border-radius:4px; font-size:14px; width:180px; margin-right:8px; }
button { padding:9px 20px; background:#D6A21C; color:#000; border:none; border-radius:4px; font-weight:700; font-size:14px; cursor:pointer; margin-right:8px; }
.out { margin-top:12px; font-size:13px; line-height:1.8; white-space:pre-wrap; }
.g { color:#69db7c; } .r { color:#ff6b6b; } .y { color:#ffa94d; } .b { color:#74c0fc; }
</style>
</head>
<body>
<h1>TECH4ZERO Debug Console</h1>

<div class="card">
  <h2>1 — Login</h2>
  <input id="u" placeholder="username" />
  <input id="p" type="password" placeholder="password" />
  <button onclick="login()">LOGIN</button>
  <div class="out" id="r1"></div>
</div>

<div class="card">
  <h2>2 — Session</h2>
  <button onclick="session()">CHECK SESSION</button>
  <div class="out" id="r2"></div>
</div>

<div class="card">
  <h2>3 — Options (gender question)</h2>
  <button onclick="opts()">CHECK OPTIONS</button>
  <div class="out" id="r3"></div>
</div>

<script>
var QID = 'ee2e381a-3a66-4a41-b011-63ef249162ae';

function set(id, html) { document.getElementById(id).innerHTML = html; }

async function login() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value.trim();
  set('r1', '<span class="b">Logging in...</span>');
  var r = await fetch('/api/login', {method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p})});
  var d = await r.json();
  set('r1', d.ok
    ? '<span class="g">✓ Logged in as: ' + (d.school_name||u) + '</span>'
    : '<span class="r">✗ Failed: ' + (d.error||'unknown') + '</span>');
}

async function session() {
  set('r2', '<span class="b">Checking...</span>');
  var r = await fetch('/api/me', {credentials:'include'});
  var txt = await r.text();
  try {
    var d = JSON.parse(txt);
    set('r2',
      '<span class="' + (d.ok?'g':'r') + '">ok: ' + d.ok + '</span>\n' +
      'school_name: <span class="y">' + (d.school_name||'none') + '</span>\n' +
      'language:    <span class="y">' + (d.language||'none') + '</span>\n' +
      'country:     <span class="y">' + (d.country||'none') + '</span>'
    );
  } catch(e) {
    set('r2', '<span class="r">Not JSON: ' + txt.substring(0,300) + '</span>');
  }
}

async function opts() {
  set('r3', '<span class="b">Checking...</span>');
  var out = '';

  async function test(label, url) {
    var r = await fetch(url, {credentials:'include'});
    var txt = await r.text();
    try {
      var d = JSON.parse(txt);
      var count = (d.options||[]).length;
      out += '<span class="y">' + label + '</span> — ' + count + ' options\n';
      (d.options||[]).forEach(function(o) {
        out += '  "' + o.option_text + '" [lang=' + (o.language||'NULL') + ']\n';
      });
    } catch(e) {
      out += '<span class="r">' + label + ' ERROR: ' + txt.substring(0,200) + '</span>\n';
    }
    out += '\n';
  }

  await test('NO lang param',   '/api/question-options?questionId='+QID);
  await test('?lang=es',        '/api/question-options?questionId='+QID+'&lang=es');
  await test('?lang=en',        '/api/question-options?questionId='+QID+'&lang=en');
  set('r3', out);
}
</script>
</body>
</html>
