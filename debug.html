<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Options Debug</title></head>
<body style="background:#0a1520; color:#fff; font-family:monospace; padding:20px; font-size:13px;">
<h2 style="color:#D6A21C;">question-options API debug</h2>
<div id="out"></div>
<script>
function log(msg, color) {
  document.getElementById('out').innerHTML +=
    '<div style="padding:4px 0; border-bottom:1px solid #1E2F3F; color:'+(color||'#fff')+'">'+msg+'</div>';
}

var qid = 'ee2e381a-3a66-4a41-b011-63ef249162ae'; // gender question

// Test 1: no lang param
fetch('/api/question-options?questionId='+qid, {credentials:'include'})
  .then(r=>r.json()).then(d=>{
    log('WITHOUT ?lang — total options: '+d.options.length, '#ffa94d');
    d.options.forEach(o=>log('  '+o.option_text+' | lang='+o.language));
  });

// Test 2: with ?lang=es
fetch('/api/question-options?questionId='+qid+'&lang=es', {credentials:'include'})
  .then(r=>r.json()).then(d=>{
    log('WITH ?lang=es — total options: '+d.options.length, '#69db7c');
    d.options.forEach(o=>log('  '+o.option_text+' | lang='+o.language));
  });

// Test 3: with ?lang=en
fetch('/api/question-options?questionId='+qid+'&lang=en', {credentials:'include'})
  .then(r=>r.json()).then(d=>{
    log('WITH ?lang=en — total options: '+d.options.length, '#69db7c');
    d.options.forEach(o=>log('  '+o.option_text+' | lang='+o.language));
  });
</script>
</body>
</html>
