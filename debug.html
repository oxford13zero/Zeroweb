<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Primaria Debug</title>
<style>
body { margin:0; padding:20px; background:#0a1520; color:#fff; font-family:monospace; font-size:13px; }
h1 { color:#D6A21C; margin:0 0 16px 0; }
.card { background:#16222D; border:1px solid #365468; border-radius:8px; padding:14px; margin-bottom:12px; }
.card h2 { margin:0 0 10px 0; color:#D6A21C; font-size:14px; }
button { padding:8px 18px; background:#D6A21C; color:#000; border:none; border-radius:4px; font-weight:700; cursor:pointer; margin-right:8px; }
input { padding:7px; background:#1E2F3F; border:1px solid #365468; color:#fff; border-radius:4px; width:160px; margin-right:6px; }
.out { margin-top:10px; white-space:pre-wrap; line-height:1.7; font-size:12px; }
.g{color:#69db7c;}.r{color:#ff6b6b;}.y{color:#ffa94d;}.b{color:#74c0fc;}
</style>
</head>
<body>
<h1>Primaria Debug</h1>

<div class="card">
  <h2>1 — Login</h2>
  <input id="u" placeholder="username" />
  <input id="p" type="password" placeholder="password" />
  <button onclick="login()">LOGIN</button>
  <div class="out" id="r1"></div>
</div>

<div class="card">
  <h2>2 — Check deployed index file</h2>
  <button onclick="checkIndex()">CHECK /en/index.html</button>
  <div class="out" id="r2"></div>
</div>

<div class="card">
  <h2>3 — Check routing-config (what survey file does it return?)</h2>
  <button onclick="checkRouting('en')">CHECK ?lang=en</button>
  <button onclick="checkRouting('es')" style="background:#365468;color:#fff;">CHECK ?lang=es</button>
  <div class="out" id="r3"></div>
</div>

<div class="card">
  <h2>4 — Check options for p4_edad question</h2>
  <button onclick="checkOpts('en')">CHECK ?lang=en</button>
  <button onclick="checkOpts('es')" style="background:#365468;color:#fff;">CHECK ?lang=es</button>
  <button onclick="checkOpts('')" style="background:#243A4B;color:#fff;">CHECK no lang</button>
  <div class="out" id="r4"></div>
</div>

<script>
function set(id, html) { document.getElementById(id).innerHTML = html; }
function row(label, val, cls) {
  return '<span class="'+(cls||'')+'">'+label+': '+val+'</span>\n';
}

// p4_edad question — we need its DB UUID
// First find it via the index page vars, or test directly
var P4_EDAD_QID = null;

async function login() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value.trim();
  var r = await fetch('/api/login', {method:'POST',credentials:'include',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  var d = await r.json();
  set('r1', d.ok
    ? '<span class="g">✓ '+d.school_name+' | language='+d.language+'</span>'
    : '<span class="r">✗ '+(d.error||'unknown')+'</span>');
}

async function checkIndex() {
  var r = await fetch('/en/', {credentials:'include'});
  var html = await r.text();
  var out = '';
  out += row('Size', html.length+' chars');
  out += row('CHOSEN_LANGUAGE resolved fix',
    html.includes("CHOSEN_LANGUAGE === 'both'") ? '✓ YES' : '✗ NO',
    html.includes("CHOSEN_LANGUAGE === 'both'") ? 'g' : 'r');
  out += row('IS_PRIMARIA catches elementary',
    html.includes("description === 'elementary'") ? '✓ YES' : '✗ NO',
    html.includes("description === 'elementary'") ? 'g' : 'r');
  out += row('lang param in question-options',
    html.includes("lang=${CHOSEN_LANGUAGE}") ? '✓ YES' : '✗ NO',
    html.includes("lang=${CHOSEN_LANGUAGE}") ? 'g' : 'r');
  out += row('language in refreshSession',
    html.includes("language: data?.language") ? '✓ YES' : '✗ NO',
    html.includes("language: data?.language") ? 'g' : 'r');
  set('r2', out);
}

async function checkRouting(lang) {
  var url = '/api/routing-config' + (lang ? '?lang='+lang : '');
  var r = await fetch(url, {credentials:'include'});
  var txt = await r.text();
  try {
    var d = JSON.parse(txt);
    var out = row('ok', d.ok, d.ok?'g':'r');
    out += row('language', d.language, 'y');
    out += row('question_text', d.question_text||'(none)');
    out += row('# options', (d.options||[]).length);
    if (d.options) {
      out += '\nOptions:\n';
      d.options.forEach(o => out += '  code='+o.code+' text='+o.text+'\n');
    }
    if (d.routing_rules) {
      out += '\nRouting rules:\n';
      Object.entries(d.routing_rules).forEach(([k,v]) => {
        out += '  '+k+' → '+v.survey_file+'\n';
      });
    }
    set('r3', out);
  } catch(e) {
    set('r3', '<span class="r">ERROR: '+txt.substring(0,300)+'</span>');
  }
}

async function checkOpts(lang) {
  // First get the p4_edad question ID from routing
  var r1 = await fetch('/api/routing-config?lang='+(lang||'es'), {credentials:'include'});
  var rc = await r1.json().catch(()=>({}));

  // Get survey file from routing
  var surveyFile = null;
  if (rc.routing_rules) {
    var first = Object.values(rc.routing_rules)[0];
    surveyFile = first ? first.survey_file : null;
  }

  var out = row('Survey file from routing', surveyFile||'(none)', surveyFile?'y':'r');

  if (!surveyFile) { set('r4', out); return; }

  // Load the survey JSON
  var r2 = await fetch('/data/'+surveyFile, {cache:'no-store'});
  var survey = await r2.json().catch(()=>null);
  if (!survey) { out += row('Survey load', 'FAILED', 'r'); set('r4', out); return; }

  out += row('Survey uuid', survey.survey?.survey_uuid||'(none)', 'y');
  out += row('Survey description', survey.survey?.description||'(none)', 'y');
  out += row('# questions', (survey.questions||[]).length);

  // Get questions-map to find p4_edad UUID
  var surveyId = survey.survey?.survey_uuid;
  if (!surveyId) { out += row('No survey_uuid', 'cannot fetch options', 'r'); set('r4', out); return; }

  var r3 = await fetch('/api/questions-map?surveyId='+surveyId, {credentials:'include'});
  var qmap = await r3.json().catch(()=>({}));
  out += row('questions-map ok', qmap.ok, qmap.ok?'g':'r');

  if (!qmap.ok) { out += row('qmap error', qmap.error||'unknown', 'r'); set('r4', out); return; }

  // Find question #1 (p4_edad)
  var q1id = qmap.map ? qmap.map['1'] : null;
  out += row('q#1 DB id (p4_edad)', q1id||'NOT FOUND', q1id?'y':'r');

  if (!q1id) { set('r4', out); return; }

  // Fetch options
  var langParam = lang ? '&lang='+lang : '';
  var url = '/api/question-options?questionId='+q1id+langParam;
  out += row('Fetching', url, 'b');

  var r4 = await fetch(url, {credentials:'include'});
  var txt = await r4.text();
  try {
    var d = JSON.parse(txt);
    out += row('options ok', d.ok, d.ok?'g':'r');
    out += row('# options returned', (d.options||[]).length,
      (d.options||[]).length <= 7 ? 'g' : 'r');
    out += '\nOptions:\n';
    (d.options||[]).forEach(o => {
      out += '  "'+o.option_text+'" code='+o.option_code+' lang='+(o.language||'NULL')+'\n';
    });
  } catch(e) {
    out += row('options ERROR', txt.substring(0,300), 'r');
  }

  set('r4', out);
}
</script>
</body>
</html>
